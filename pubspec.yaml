name: shop_app
description: "A clean-architecture Flutter e-commerce app."
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Networking
  http: ^1.2.1

  # Local storage
  shared_preferences: ^2.2.3

  # Navigation
  go_router: ^13.2.0

  # Image caching
  cached_network_image: ^3.3.1

  # DI
  get_it: ^7.7.0

  # Shimmer loading skeleton
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true